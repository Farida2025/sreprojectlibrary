<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Loans</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <div><b>Library Management</b></div>
  <nav id="nav"></nav>
  <div id="authBox"></div>
</header>
<main>

<div class="card">
  <h2>My Loans</h2>
  <div id="list"></div>
</div>

</main>
<script src="common.js"></script>

<script>
async function loadLoans() {
  try {
    const loans = await api("/api/loans/my", { auth:true });
    const list = document.getElementById("list");
    list.innerHTML = "";
    loans.forEach(l => {
      const div = document.createElement("div");
      div.className = "card";
      const returned = l.returnedAt ? new Date(l.returnedAt).toLocaleString() : null;
      div.innerHTML = `
        <b>${l.bookId?.title || "Book"}</b><br/>
        <span class="small">${l.bookId?.author || ""}</span><br/>
        Borrowed: ${new Date(l.borrowedAt).toLocaleString()}<br/>
        Returned: ${returned || "<b>NOT YET</b>"}<br/>
        ${returned ? "" : `<button class="returnBtn" data-book="${l.bookId?._id}">Return</button>`}
      `;
      list.appendChild(div);
    });

    document.querySelectorAll(".returnBtn").forEach(btn => {
      btn.onclick = async () => {
        try {
          await api("/api/loans/return", { method:"POST", body:{ bookId: btn.dataset.book }, auth:true });
          alert("Returned!");
          loadLoans();
        } catch(e) { alert(e.message); }
      };
    });
  } catch(e) {
    document.getElementById("list").innerHTML = `<div class="card">Login required. ${e.message}</div>`;
  }
}
document.addEventListener("DOMContentLoaded", loadLoans);
</script>

</body>
</html>
