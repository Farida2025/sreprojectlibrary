version: '3.8'

services:
  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  backend:
    image: my-library-backend:latest
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/library_db
      - JWT_SECRET=supersecretkey
    deploy:
      replicas: 3  
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback 
      restart_policy:
        condition: on-failure

  frontend:
    image: my-library-frontend:latest
    ports:
      - "3000:80"
    deploy:
      replicas: 3 

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    deploy:
      mode: global

volumes:
  mongo_data: